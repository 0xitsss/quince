name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin quince --bin dump_qfl

      - name: Archive binaries
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/quince${{ matrix.suffix }} artifacts/
          cp target/${{ matrix.target }}/release/dump_qfl${{ matrix.suffix }} artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quince-${{ matrix.target }}
          path: artifacts/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: quince-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum quince* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            quince*
            checksums.txt
          generate_release_notes: true
