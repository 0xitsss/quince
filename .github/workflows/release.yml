name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: 0.6.6)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name }}-${{ github.event.inputs.tag || 'auto' }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - name: Resolve version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${VERSION#refs/tags/}"
          VERSION="${VERSION#v}"
          if [ -z "${VERSION}" ]; then
            echo "Release version is empty" >&2
            exit 1
          fi
          if [[ "${VERSION}" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: quince-x86_64-linux-gnu
            suffix: ""
            strip: strip
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: quince-x86_64-windows-msvc
            suffix: ".exe"
            strip: ""

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-
            release-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin quince --bin dump_qfl

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/quince${{ matrix.suffix }}" "dist/quince${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/dump_qfl${{ matrix.suffix }}" "dist/dump_qfl${{ matrix.suffix }}"
          if [ -n "${{ matrix.strip }}" ]; then
            ${{ matrix.strip }} dist/*
          fi
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a -tzip "${{ matrix.asset }}.zip" *
            sha256sum "${{ matrix.asset }}.zip" > "${{ matrix.asset }}.zip.sha256"
          else
            tar -czf "${{ matrix.asset }}.tar.gz" --owner=0 --group=0 --numeric-owner *
            sha256sum "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
