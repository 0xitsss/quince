name: Docs

on:
  push:
    branches: [master]
    paths:
      - "book/**"
      - "tools/docgen/**"
      - "**/*.rs"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install mdBook
        run: |
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Fetch benchmark data from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify refs/remotes/origin/gh-pages &>/dev/null; then
            mkdir -p book/src/dev
            git checkout origin/gh-pages -- dev/bench/ 2>/dev/null || true
            if [ -d dev/bench ]; then
              cp -r dev/bench book/src/dev/
              echo "Benchmark data copied from gh-pages"
            fi
          else
            echo "No gh-pages branch found — skipping benchmark data"
          fi

      - name: Generate API docs
        run: cargo run -p docgen

      - name: Build book
        run: mdbook build book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
