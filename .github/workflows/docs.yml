name: Docs

on:
  push:
    branches: [master]
    paths:
      - "book/**"
      - "tools/docgen/**"
      - "**/*.rs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install mdBook
        run: |
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Fetch benchmark data from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify refs/remotes/origin/gh-pages &>/dev/null; then
            mkdir -p book/src/dev
            git checkout origin/gh-pages -- dev/bench/ 2>/dev/null || true
            if [ -d dev/bench ]; then
              cp -r dev/bench book/src/dev/
              echo "Benchmark data copied from gh-pages"
            fi
          else
            echo "No gh-pages branch found — skipping benchmark data"
          fi

      - name: Generate API docs
        run: cargo run -p docgen

      - name: Build book
        run: mdbook build book

      - name: Save built book
        run: cp -r book/book /tmp/book-built

      - name: Deploy to gh-pages branch
        run: |
          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify refs/remotes/origin/gh-pages &>/dev/null; then
            git checkout origin/gh-pages -b gh-pages-deploy
          else
            git checkout --orphan gh-pages-deploy
          fi

          # Remove old files
          git rm -rf --ignore-unmatch . >/dev/null 2>&1 || true

          # Copy new book build
          cp -r /tmp/book-built/* .

          # Overwrite stale benchmark data with real data from gh-pages
          if git show-ref --verify refs/remotes/origin/gh-pages &>/dev/null; then
            git checkout origin/gh-pages -- dev/bench/ 2>/dev/null || true
          fi

          git add -A
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "Update book docs [skip ci]" || echo "No changes"
          git pull --rebase origin gh-pages 2>/dev/null || true
          git push origin gh-pages-deploy:gh-pages
